<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Windchill URL Helper</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 10px;
      min-width: 230px;
    }

    .row {
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 6px;
      cursor: pointer;
    }

    #status {
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="row">
    <label>
      <input type="checkbox" id="infoFromPA" checked>
      Add <code>infoFromPA=true</code>
    </label>
  </div>

  <div class="row">
    <label>
      <input type="checkbox" id="autoUserGroupInfo">
      Auto User/Group info
    </label>
  </div>

  <div class="row">
    <label>
      <input type="checkbox" id="jcaDebug">
      jcaDebug mode
    </label>
  </div>

  <div class="row">
    <button id="applyBtn">
      Apply to current tab
    </button>
  </div>

  <div class="row">
    <span id="status"></span>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
