<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Windchill URL Helper</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 0;
      font-family: Arial, Tahoma, Verdana, sans-serif;
      font-size: 12px;
      background: #f2f3f5;
      color: #333333;
    }

    .popup {
      border: 1px solid #bfc3c7;
      background: #ffffff;
    }

    .popup-header {
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #333333;
      background: #e5e5e5;
      border-bottom: 1px solid #bfc3c7;
      border-top: 3px solid #6aae3f;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
      padding: 7px 10px;
      border-bottom: 1px solid #e0e0e0;
      background: #ffffff;
    }

    .option-row:hover {
      background: #f5f8f1;
    }

    .option-row:last-of-type {
      border-bottom: none;
    }

    .option-label {
      line-height: 1.3;
      user-select: none;
      cursor: pointer;
    }

    .toggle {
      appearance: none;
      width: 34px;
      height: 18px;
      border: 1px solid #9da3a8;
      border-radius: 9px;
      background: #d9d9d9;
      position: relative;
      cursor: pointer;
      flex: 0 0 auto;
      margin: 0;
    }

    .toggle::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      top: 1px;
      left: 1px;
      border-radius: 50%;
      background: #ffffff;
      border: 1px solid #b0b0b0;
      transition: transform 0.15s ease;
    }

    .toggle:checked {
      background: #6aae3f;
      border-color: #4f8f2f;
    }

    .toggle:checked::before {
      transform: translateX(16px);
    }

    .toggle:focus {
      outline: 1px dotted #333333;
      outline-offset: 2px;
    }

    .status-row {
      padding: 7px 10px;
      border-top: 1px solid #e0e0e0;
      background: #fafafa;
    }

    #status {
      font-size: 12px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="popup">
    <div class="popup-header">Windchill Helper</div>

    <div class="option-row">
      <label class="option-label" for="infoFromPA">
        Full User/Group info
      </label>
      <input type="checkbox" id="infoFromPA" class="toggle">
    </div>

    <div class="option-row">
      <label class="option-label" for="autoUserGroupInfo">
        Auto User/Group info
      </label>
      <input type="checkbox" id="autoUserGroupInfo" class="toggle">
    </div>

    <div class="option-row">
      <label class="option-label" for="jcaDebug">
        jcaDebug mode
      </label>
      <input type="checkbox" id="jcaDebug" class="toggle">
    </div>

    <div class="status-row">
      <span id="status"></span>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
